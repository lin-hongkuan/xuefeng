<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0c2433" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>张雪峰 · 透心凉大作战</title>
  <link rel="stylesheet" href="style.css?v=1" />
  <link rel="preload" as="image" href="assets/bg.png" />
</head>
<body>
  <div id="stage" class="stage">
    <canvas id="game"></canvas>

    <!-- In-game HUD -->
    <div id="hud" class="hud hidden">
      <div class="hud-top">
        <div class="hud-left">
          <div id="lives" class="lives" aria-label="生命值"></div>
          <div id="comboChip" class="combo-chip hidden"><span id="comboNum">2</span><small>连击</small></div>
        </div>
        <div class="hud-right">
          <div class="score-wrap">
            <div id="score" class="score">0</div>
            <div id="best" class="best">最高 0</div>
          </div>
          <button id="pauseBtn" class="icon-btn" type="button" aria-label="暂停">❚❚</button>
          <button id="muteBtn" class="icon-btn" type="button" aria-label="静音">♪</button>
        </div>
      </div>
      <div class="cool-wrap">
        <div class="cool-label">透心凉</div>
        <div class="cool-track"><div id="coolFill" class="cool-fill"></div></div>
      </div>
    </div>

    <!-- Center floating banner (combo / fever) -->
    <div id="banner" class="banner"></div>

    <!-- Loading -->
    <div id="loadingScreen" class="overlay overlay--solid">
      <div class="brand">
        <div class="brand-kicker">夏日限定 · 切水果式爽玩</div>
        <h1 class="brand-title">张雪峰<span class="dot">·</span>透心凉大作战</h1>
      </div>
      <div class="loader">
        <div class="loader-track"><div id="loaderFill" class="loader-fill"></div></div>
        <div id="loaderText" class="loader-text">素材加载中… 0%</div>
      </div>
    </div>

    <!-- Title -->
    <div id="titleScreen" class="overlay hidden">
      <div class="panel">
        <div class="brand">
          <div class="brand-kicker">夏日限定 · 切水果式爽玩</div>
          <h1 class="brand-title">张雪峰<span class="dot">·</span>透心凉大作战</h1>
        </div>
        <ul class="howto">
          <li><span class="ic ic-cut">✦</span>滑动手指<b>挥刀</b>，切中<b>雪碧</b>与<b>巧乐兹</b>得分</li>
          <li><span class="ic ic-letter">✉</span>切到金色<b>录取通知书</b>有大额奖励</li>
          <li><span class="ic ic-bomb">✘</span>千万别切<b>天坑炸弹</b>，会扣命！</li>
          <li><span class="ic ic-cool">❄</span>切爽了攒满<b>透心凉</b>，进入狂热 FEVER</li>
        </ul>
        <button id="startBtn" class="primary-btn" type="button">开 始 游 戏</button>
        <div class="title-foot">
          <span id="titleBest">最高分 0</span>
          <button id="titleMuteBtn" class="text-btn" type="button">🔊 音乐：开</button>
        </div>
      </div>
    </div>

    <!-- Pause -->
    <div id="pauseScreen" class="overlay hidden">
      <div class="panel panel--compact">
        <h2 class="panel-title">已暂停</h2>
        <button id="resumeBtn" class="primary-btn" type="button">继续</button>
        <button id="restartFromPauseBtn" class="ghost-btn" type="button">重新开始</button>
        <button id="pauseMuteBtn" class="text-btn" type="button">🔊 音乐：开</button>
      </div>
    </div>

    <!-- Game over -->
    <div id="overScreen" class="overlay hidden">
      <div class="panel">
        <h2 class="panel-title">本局结束</h2>
        <div class="result">
          <div class="result-score"><small>得分</small><b id="finalScore">0</b></div>
          <div class="result-row">
            <div><small>最高分</small><b id="finalBest">0</b></div>
            <div><small>最高连击</small><b id="finalCombo">0</b></div>
          </div>
        </div>
        <div id="quote" class="quote">“你切得过我你信吗！”</div>
        <button id="againBtn" class="primary-btn" type="button">再 来 一 局</button>
        <button id="homeBtn" class="ghost-btn" type="button">回到首页</button>
      </div>
    </div>
  </div>

  <!-- Reused audio from the original site -->
  <audio id="bgm" src="assets/bgm.m4a" loop preload="auto"></audio>
  <audio id="deathSfx" src="assets/death.mp3" preload="auto"></audio>

  <script src="game.js?v=1"></script>
</body>
</html>
