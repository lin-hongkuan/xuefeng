<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0c2433" />
  <title>张雪峰 · 透心凉叠叠乐</title>
  <link rel="stylesheet" href="style.css?v=1" />
  <link rel="preload" as="image" href="assets/bg.png" />
</head>
<body>
  <div id="stage" class="stage">
    <canvas id="game"></canvas>

    <div id="hud" class="hud hidden">
      <div class="hud-top">
        <div class="hud-left">
          <div id="comboChip" class="combo-chip hidden"><span id="comboNum">2</span><small>完美</small></div>
        </div>
        <div class="hud-right">
          <div class="score-wrap">
            <div id="score" class="score">0</div>
            <div id="best" class="best">最高 0</div>
          </div>
          <button id="pauseBtn" class="icon-btn" type="button" aria-label="暂停">❚❚</button>
          <button id="muteBtn" class="icon-btn" type="button" aria-label="静音">♪</button>
        </div>
      </div>
      <div id="tapHint" class="tap-hint">点击屏幕放下方块</div>
    </div>

    <div id="banner" class="banner"></div>

    <div id="loadingScreen" class="overlay overlay--solid">
      <div class="brand">
        <div class="brand-kicker">夏日限定 · 一拍即合叠叠乐</div>
        <h1 class="brand-title">张雪峰<span class="dot">·</span>透心凉叠叠乐</h1>
      </div>
      <div class="loader">
        <div class="loader-track"><div id="loaderFill" class="loader-fill"></div></div>
        <div id="loaderText" class="loader-text">素材加载中… 0%</div>
      </div>
    </div>

    <div id="titleScreen" class="overlay hidden">
      <div class="panel">
        <div class="brand">
          <div class="brand-kicker">夏日限定 · 一拍即合叠叠乐</div>
          <h1 class="brand-title">张雪峰<span class="dot">·</span>透心凉叠叠乐</h1>
        </div>
        <ul class="howto">
          <li><span class="ic ic-cut">▦</span>方块左右滑动，<b>点击</b>把它叠在塔顶</li>
          <li><span class="ic ic-cool">◎</span>没对齐的部分会<b>被削掉</b>，越叠越窄</li>
          <li><span class="ic ic-letter">★</span><b>完美对齐</b>触发连击，塔身回宽 + 加分</li>
          <li><span class="ic ic-bomb">✘</span>叠歪到<b>完全没接住</b>就结束，叠多高算多高</li>
        </ul>
        <button id="startBtn" class="primary-btn" type="button">开 始 叠 塔</button>
        <div class="title-foot">
          <span id="titleBest">最高 0 层</span>
          <button id="titleMuteBtn" class="text-btn" type="button">🔊 音乐：开</button>
        </div>
      </div>
    </div>

    <div id="pauseScreen" class="overlay hidden">
      <div class="panel panel--compact">
        <h2 class="panel-title">已暂停</h2>
        <button id="resumeBtn" class="primary-btn" type="button">继续</button>
        <button id="restartFromPauseBtn" class="ghost-btn" type="button">重新开始</button>
        <button id="pauseMuteBtn" class="text-btn" type="button">🔊 音乐：开</button>
      </div>
    </div>

    <div id="overScreen" class="overlay hidden">
      <div class="panel">
        <h2 class="panel-title">塔倒了！</h2>
        <div class="result">
          <div class="result-score"><small>叠了</small><b id="finalScore">0</b><small>层</small></div>
          <div class="result-row">
            <div><small>最高纪录</small><b id="finalBest">0</b></div>
            <div><small>最长完美</small><b id="finalCombo">0</b></div>
          </div>
        </div>
        <div id="quote" class="quote">“稳住，下一层我看好你！”</div>
        <button id="againBtn" class="primary-btn" type="button">再 叠 一 次</button>
        <button id="homeBtn" class="ghost-btn" type="button">回到首页</button>
      </div>
    </div>
  </div>

  <audio id="bgm" src="assets/bgm.m4a" loop preload="auto"></audio>
  <audio id="deathSfx" src="assets/death.mp3" preload="auto"></audio>
  <script src="game.js?v=1"></script>
</body>
</html>
