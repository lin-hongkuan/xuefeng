<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#f3e7cf" />
  <title>张雪峰 · 弹射名师</title>
  <link rel="stylesheet" href="style.css?v=1" />
</head>
<body>
  <div id="stage" class="stage">
    <canvas id="game"></canvas>

    <div id="hud" class="hud hidden">
      <div class="hud-top">
        <div class="hud-left">
          <div id="lives" class="lives"></div>
          <div id="comboChip" class="combo-chip hidden"><span id="comboNum">2</span><small>连击</small></div>
        </div>
        <div class="hud-right">
          <div class="score-wrap">
            <div id="score" class="score">0</div>
            <div id="best" class="best">最高 0</div>
          </div>
          <button id="pauseBtn" class="icon-btn" type="button" aria-label="暂停">❚❚</button>
          <button id="muteBtn" class="icon-btn" type="button" aria-label="静音">♪</button>
        </div>
      </div>
      <div id="tapHint" class="tap-hint">按住往后拉，松手把张老师弹出去！</div>
    </div>

    <div id="banner" class="banner"></div>

    <div id="loadingScreen" class="overlay overlay--solid">
      <div class="brand">
        <div class="brand-kicker">剪纸手工 · 弹射连撞</div>
        <h1 class="brand-title">张雪峰<span class="dot">·</span>弹射名师</h1>
      </div>
      <div class="loader">
        <div class="loader-track"><div id="loaderFill" class="loader-fill"></div></div>
        <div id="loaderText" class="loader-text">素材加载中… 0%</div>
      </div>
    </div>

    <div id="titleScreen" class="overlay hidden">
      <div class="panel">
        <div class="brand">
          <div class="brand-kicker">剪纸手工 · 弹射连撞</div>
          <h1 class="brand-title">张雪峰<span class="dot">·</span>弹射名师</h1>
        </div>
        <ul class="howto">
          <li><span class="ic ic-cut">⟲</span>按住屏幕<b>往后拉</b>蓄力，松手把张老师<b>弹射</b>出去</li>
          <li><span class="ic ic-cool">✦</span>撞到<b>迷茫同学</b>就点醒他，并<b>加速</b> → 一杆<b>连撞</b>越多越爽</li>
          <li><span class="ic ic-letter">★</span>吃<b>雪碧</b>加分、<b>巧乐兹</b>让下一发变成开路金句</li>
          <li><span class="ic ic-bomb">✘</span>躲开会乱飘的<b>天坑炸弹</b>，撞到扣命（共 3 条）</li>
        </ul>
        <button id="startBtn" class="primary-btn" type="button">开 始 弹 射</button>
        <div class="title-foot">
          <span id="titleBest">最高 0</span>
          <button id="titleMuteBtn" class="text-btn" type="button">🔊 音乐：开</button>
        </div>
      </div>
    </div>

    <div id="pauseScreen" class="overlay hidden">
      <div class="panel panel--compact">
        <h2 class="panel-title">暂停一下</h2>
        <button id="resumeBtn" class="primary-btn" type="button">继续</button>
        <button id="restartFromPauseBtn" class="ghost-btn" type="button">重新开始</button>
        <button id="pauseMuteBtn" class="text-btn" type="button">🔊 音乐：开</button>
      </div>
    </div>

    <div id="overScreen" class="overlay hidden">
      <div class="panel">
        <h2 class="panel-title">弹不动啦！</h2>
        <div class="result">
          <div class="result-score"><small>点醒</small><b id="finalScore">0</b><small>人</small></div>
          <div class="result-row">
            <div><small>最高分</small><b id="finalBest">0</b></div>
            <div><small>最强连撞</small><b id="finalCombo">0</b></div>
          </div>
        </div>
        <div id="quote" class="quote">“这一杆，漂亮！再来一发？”</div>
        <button id="againBtn" class="primary-btn" type="button">再 弹 一 局</button>
        <button id="homeBtn" class="ghost-btn" type="button">回到首页</button>
      </div>
    </div>
  </div>

  <audio id="bgm" src="assets/bgm.m4a" loop preload="auto"></audio>
  <audio id="deathSfx" src="assets/death.mp3" preload="auto"></audio>
  <script src="game.js?v=1"></script>
</body>
</html>
